# Snakemake workdir - environments and output are written to this directory
output_directory: /prj/rpbp-dev/Maja_data_hIPSC_diff/comparison/benchmark/results

# Tools to benchmark
tools:
  - anota2seq
  - riborex
  - deltate
  - ribotools_lrt
  - ribotools_dte

# Input data
data:
  benchmark1:
    ribo: "data/Oertlin/ribo_counts.csv"
    rna: "data/Oertlin/rna_counts.csv"
    samples: "data/Oertlin/samples.csv"
  benchmark2:
    ribo: "data/Boileau/ribo_counts.csv"
    rna: "data/Boileau/rna_counts.csv"
    samples: "data/Boileau/samples.csv"

# TEA
params:
  benchmark1:
    fdr_threshold: 0.1
  benchmark2:
    fdr_threshold: 0.05
    n_permutations: 10

# Benchmarks - match input data, params, and Snakemake rules
benchmarks:
  - "benchmark1"
  - "benchmark2"
